version: '3.8'

services:

  # ── Application Spring Boot ───────────────────────────────────────────────
  app:
    build: .
    container_name: tp8-app
    ports:
      - "8080:8080"
    networks:
      - monitoring-net
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tp8-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
    networks:
      - monitoring-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: tp8-grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring-net
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  monitoring-net:
    driver: bridge

volumes:
  grafana-data:
