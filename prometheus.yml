global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Règles d'alertes
rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: 'tp8-spring-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
    # Optionnel si Prometheus tourne en local (pas Docker)
    # - targets: ['localhost:8080']
